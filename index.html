<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приватная галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .item {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .item img, .item video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #000;
        }
        .item video {
            pointer-events: none;
        }
        .info {
            padding: 10px;
            color: #ccc;
            font-size: 12px;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 80%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: 0 auto;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        .modal-title {
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .item img, .item video {
                height: 140px;
            }
        }
    </style>
</head>
<body>

<!-- AGE GATE 18+ -->

    <h1 style="font-size:48px;">🔞 18+</h1>
    <p style="font-size:18px; margin:20px;">Доступ разрешен только совершеннолетним</p>
    <button onclick="document.getElementById('ageGate').style.display='none'" style="padding:12px 40px; background:#ff4444; color:white; border:none; border-radius:30px; font-size:18px; cursor:pointer;">Мне есть 18 →</button>
</div>

<h1>📁 Приватная галерея</h1>
<div class="gallery" id="gallery"></div>

<div id="modal" class="modal">
    <button class="close" id="closeModal">&times;</button>
    <div class="modal-content" id="modalContent"></div>
    <div class="modal-title" id="modalTitle"></div>
</div>

<script>
    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');

    function renderGallery(items) {
        gallery.innerHTML = '';
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => openModal(index, items);
            
            if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.url;
                video.preload = 'metadata';
                div.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = item.url;
                img.loading = 'lazy';
                div.appendChild(img);
            }
            
            const info = document.createElement('div');
            info.className = 'info';
            info.textContent = item.name || (item.type === 'video' ? '🎬 Видео' : '📷 Фото');
            div.appendChild(info);
            
            gallery.appendChild(div);
        });
    }

    function openModal(index, items) {
        const item = items[index];
        modalContent.innerHTML = '';
        
        if (item.type === 'video') {
            const video = document.createElement('video');
            video.src = item.url;
            video.controls = true;
            video.autoplay = true;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '80vh';
            modalContent.appendChild(video);
        } else {
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.name;
            modalContent.appendChild(img);
        }
        
        modalTitle.textContent = item.name || (item.type === 'video' ? 'Видео' : 'Фото');
        modal.classList.add('active');
    }

    closeModal.onclick = () => {
        modal.classList.remove('active');
        modalContent.innerHTML = '';
    };

    modal.onclick = (e) => {
        if (e.target === modal) {
            modal.classList.remove('active');
            modalContent.innerHTML = '';
        }
    };

    // ========== ЗАГРУЗКА КОНТЕНТА ==========
    // Вариант 1: прямой массив (замени на свои ссылки)
    /*
    const items = [
        { type: "image", url: "https://pixeldrain.com/api/file/ВАШ_КОД", name: "Фото 1", date: "2025-03-20" },
        { type: "video", url: "https://pixeldrain.com/api/file/ВАШ_КОД", name: "Видео 1", date: "2025-03-18" }
    ];
    // Фильтрация по дате (последние 30 дней)
    const now = new Date();
    const cutoff = new Date();
    cutoff.setDate(now.getDate() - 30);
    const filtered = items.filter(i => new Date(i.date) > cutoff);
    renderGallery(filtered);
    */
    
    // Вариант 2: загрузка из JSON (рекомендуется)
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            // Фильтрация по дате (последние 30 дней)
            const now = new Date();
            const cutoff = new Date();
            cutoff.setDate(now.getDate() - 30);
            
            const filtered = data.items.filter(item => {
                if (!item.date) return true; // если даты нет, показываем
                return new Date(item.date) > cutoff;
            });
            
            renderGallery(filtered);
        })
        .catch(error => {
            console.error('Ошибка загрузки:', error);
            gallery.innerHTML = '<p style="color:white; text-align:center;">Ошибка загрузки контента. Проверьте подключение.</p>';
        });
</script>
</body>
</html>
