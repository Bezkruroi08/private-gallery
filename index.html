<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приватная галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .item {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .item img, .item video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #000;
        }
        .item video {
            pointer-events: none;
        }
        .info {
            padding: 10px;
            color: #ccc;
            font-size: 12px;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 80%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: 0 auto;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        .modal-title {
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }
        .item video {
            background: #1a1a1a url('https://img.icons8.com/ios-filled/50/ffffff/play-button-circled.png') no-repeat center;
            background-size: 48px;
        }
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .item img, .item video {
                height: 140px;
            }
        }
        /* Скрываем меню скачивания в некоторых браузерах */
        video::-internal-media-controls-download-button {
            display: none;
        }
        video::-webkit-media-controls-enclosure {
            overflow: hidden;
        }
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px);
        }
    </style>
    <!-- ПАРОЛЬНАЯ ЗАЩИТА -->
    <script>
        // ПАРОЛЬНАЯ ЗАЩИТА
        const VALID_PASSWORD = "апрель2026";
        const VALID_UNTIL = "2026-04-30";
        
        function checkAccess() {
            const today = new Date();
            const expiryDate = new Date(VALID_UNTIL);
            
            // Проверяем сохранённую сессию
            const savedSession = localStorage.getItem("priv_gallery_session");
            const sessionValidUntil = localStorage.getItem("priv_gallery_expiry");
            
            if (savedSession && sessionValidUntil) {
                const sessionDate = new Date(sessionValidUntil);
                if (sessionDate > today) {
                    return true;
                }
            }
            
            // Запрашиваем пароль
            let userPass = null;
            let attempts = 0;
            const maxAttempts = 3;
            
            while (attempts < maxAttempts) {
                userPass = prompt("🔒 Введите пароль доступа:");
                
                // Если нажали "Отмена"
                if (userPass === null) {
                    attempts++;
                    if (attempts < maxAttempts) {
                        alert(`Доступ запрещён. Осталось попыток: ${maxAttempts - attempts}`);
                    }
                    continue;
                }
                
                // Проверяем пароль
                if (userPass === VALID_PASSWORD && today <= expiryDate) {
                    localStorage.setItem("priv_gallery_session", "true");
                    localStorage.setItem("priv_gallery_expiry", VALID_UNTIL);
                    return true;
                } else {
                    attempts++;
                    if (attempts < maxAttempts) {
                        alert(`Неверный пароль. Осталось попыток: ${maxAttempts - attempts}`);
                    }
                }
            }
            
            // Если все попытки исчерпаны или нажали "Отмена" 3 раза
            showBlockScreen(today > expiryDate);
            return false;
        }
        
        function showBlockScreen(isExpired) {
            document.body.innerHTML = `
                <div style="background: black; color: white; text-align: center; padding: 100px 20px; font-family: sans-serif; min-height: 100vh;">
                    <h1 style="font-size: 32px;">🔒 Доступ закрыт</h1>
                    <p style="margin: 20px 0; color: #aaa;">
                        ${isExpired ? 'Срок действия пароля истёк.' : 'Неверный пароль.'}
                    </p>
                    <p style="margin-top: 30px; font-size: 14px;">
                        Доступ предоставляется только подписчикам Telegram-канала.<br>
                        Продлите подписку, чтобы получить новый пароль.
                    </p>
                    <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 30px; background: #ff4444; color: white; border: none; border-radius: 8px; cursor: pointer;">Попробовать снова</button>
                </div>
            `;
        }
        
        // Запускаем проверку
        if (!checkAccess()) {
            // Останавливаем выполнение страницы
            throw new Error("Доступ запрещён");
        }
    </script>

<script>
    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');

    function renderGallery(items) {
        gallery.innerHTML = '';
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => openModal(index, items);
            
            if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.url;
                video.preload = 'metadata';
                div.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = item.url;
                img.loading = 'lazy';
                div.appendChild(img);
            }
            
            const info = document.createElement('div');
            info.className = 'info';
            info.textContent = item.name || (item.type === 'video' ? '🎬 Видео' : '📷 Фото');
            div.appendChild(info);
            
            gallery.appendChild(div);
        });
    }

    function openModal(index, items) {
        const item = items[index];
        modalContent.innerHTML = '';
        
        if (item.type === 'video') {
            const video = document.createElement('video');
            video.src = item.url;
            video.controls = true;
            video.autoplay = true;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '80vh';
            modalContent.appendChild(video);
        } else {
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.name;
            modalContent.appendChild(img);
        }
        
        modalTitle.textContent = item.name || (item.type === 'video' ? 'Видео' : 'Фото');
        modal.classList.add('active');
    }

    closeModal.onclick = () => {
        modal.classList.remove('active');
        modalContent.innerHTML = '';
    };

    modal.onclick = (e) => {
        if (e.target === modal) {
            modal.classList.remove('active');
            modalContent.innerHTML = '';
        }
    };
