<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приватная галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .item {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .item img, .item video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #000;
        }
        .item video {
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .item video.loaded {
            opacity: 1;
        }
        .item .placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .info {
            padding: 10px;
            color: #ccc;
            font-size: 12px;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 80%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: 0 auto;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        .modal-title {
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }
        .loader {
            color: white;
            text-align: center;
            padding: 20px;
        }
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .item img, .item video, .item .placeholder {
                height: 140px;
            }
        }
        video::-internal-media-controls-download-button {
            display: none;
        }
        video::-webkit-media-controls-enclosure {
            overflow: hidden;
        }
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px);
        }
    </style>
</head>

    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modalContent');

    const closeModal = document.getElementById('closeModal');

    // ========== ОПТИМИЗИРОВАННАЯ ФУНКЦИЯ ГАЛЕРЕИ ==========
    function renderGallery(items) {
        gallery.innerHTML = '';
        
        // Наблюдатель для ленивой загрузки
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const div = entry.target;
                    const item = div._item;
                    
                    if (item.type === 'video') {
                        const video = document.createElement('video');
                        video.src = item.url;
                        video.preload = 'metadata';
                        video.muted = true;
                        video.playsInline = true;
                        video.style.width = '100%';
                        video.style.height = '180px';
                        video.style.objectFit = 'cover';
                        video.style.background = '#1a1a1a';
                        // Показываем первый кадр
                        video.addEventListener('loadedmetadata', () => {
                            video.currentTime = 0.1;
                            video.classList.add('loaded');
                        });
                        div.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.url;
                        img.loading = 'lazy';
                        img.alt = item.name;
                        img.style.width = '100%';
                        img.style.height = '180px';
                        img.style.objectFit = 'cover';
                        div.insertBefore(img, div.firstChild);
                    }
                    
                    observer.unobserve(div);
                }
            });
        }, { rootMargin: '200px' });
        
        // Создаём элементы-заглушки
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => openModal(index, items);
            div._item = item;
            
            // Заглушка
            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            placeholder.textContent = item.type === 'video' ? '🎬' : '📷';
            div.appendChild(placeholder);
            
            const info = document.createElement('div');
            info.className = 'info';
            info.textContent = item.name;
            div.appendChild(info);
            
            gallery.appendChild(div);
            observer.observe(div);
        });
    }

    // ========== ОПТИМИЗИРОВАННОЕ МОДАЛЬНОЕ ОКНО ==========
    function openModal(index, items) {
        const item = items[index];
        modalContent.innerHTML = '';
        
        // Индикатор загрузки
        const loader = document.createElement('div');
        loader.className = 'loader';
        loader.textContent = '⏳ Загрузка...';
        modalContent.appendChild(loader);
        
        if (item.type === 'video') {
            const video = document.createElement('video');
            video.src = item.url;
            video.controls = true;
            video.autoplay = true;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '80vh';
            
            video.oncanplay = () => {
                modalContent.removeChild(loader);
                modalContent.appendChild(video);
            };
            
            video.onerror = () => {
                loader.textContent = '❌ Ошибка загрузки видео. Попробуйте позже.';
                setTimeout(() => modal.classList.remove('active'), 2000);
            };
        } else {
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.name;
            
            img.onload = () => {
                modalContent.removeChild(loader);
                modalContent.appendChild(img);
            };
            
            img.onerror = () => {
                loader.textContent = '❌ Ошибка загрузки фото. Попробуйте позже.';
                setTimeout(() => modal.classList.remove('active'), 2000);
            };
        }
        
        modalTitle.textContent = item.name;
        modal.classList.add('active');
    }

    closeModal.onclick = () => {
        modal.classList.remove('active');
        modalContent.innerHTML = '';
    };

    modal.onclick = (e) => {
        if (e.target === modal) {
            modal.classList.remove('active');
            modalContent.innerHTML = '';
        }
    };

    // ========== ПРОВЕРКА ТОКЕНА ==========
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    let userName = "";
    let planName = "";
    let expiryDate = "";
    
    async function checkToken() {
        if (!token) {
            showNoTokenScreen();
            return false;
        }
        
        try {
            const response = await fetch(`check_token.php?token=${encodeURIComponent(token)}`);
            const data = await response.json();
            
            if (data.valid) {
                userName = data.name;
                planName = data.plan;
                expiryDate = data.expires;
                
                const greetingDiv = document.createElement('div');
                greetingDiv.id = 'userGreeting';
                greetingDiv.style.cssText = 'text-align: right; color: #aaa; font-size: 12px; margin-bottom: 10px;';
                greetingDiv.innerHTML = `👋 ${userName} | Тариф: ${planName} | До ${expiryDate}`;
                const title = document.querySelector('h1');
                if (title) title.insertAdjacentElement('afterend', greetingDiv);
                return true;
            } else if (data.error === 'expired') {
                showExpiredScreen(data.name, data.plan, data.expires);
                return false;
            } else {
                showInvalidTokenScreen();
                return false;
            }
        } catch (error) {
            console.error('Ошибка проверки:', error);
            showErrorScreen();
            return false;
        }
    }
    
    function showNoTokenScreen() {
        document.body.innerHTML = `
            <div style="background: black; color: white; text-align: center; padding: 100px 20px; font-family: sans-serif; min-height: 100vh;">
                <h1 style="font-size: 32px;">🔒 Доступ по приглашению</h1>
                <p style="margin: 20px 0; color: #aaa;">Для доступа к галерее необходима индивидуальная ссылка-приглашение.</p>
                <p style="margin-top: 30px; font-size: 14px;">Приобретите доступ в Telegram-канале, чтобы получить свою ссылку.</p>
            </div>
        `;
    }
    
    function showInvalidTokenScreen() {
        document.body.innerHTML = `
            <div style="background: black; color: white; text-align: center; padding: 100px 20px; font-family: sans-serif; min-height: 100vh;">
                <h1 style="font-size: 32px;">🔒 Неверная ссылка</h1>
                <p style="margin: 20px 0; color: #aaa;">Ссылка-приглашение недействительна.</p>
                <p style="margin-top: 30px; font-size: 14px;">Проверьте правильность ссылки или обратитесь к администратору.</p>
            </div>
        `;
    }
    
    function showExpiredScreen(name, plan, expiredDate) {
        document.body.innerHTML = `
            <div style="background: black; color: white; text-align: center; padding: 100px 20px; font-family: sans-serif; min-height: 100vh;">
                <h1 style="font-size: 32px;">🔒 Срок доступа истёк</h1>
                <p style="margin: 20px 0; color: #aaa;">${name}, ваш тариф "${plan}" действовал до ${expiredDate}.</p>
                <p style="margin-top: 30px; font-size: 14px;">Продлите подписку в Telegram-канале, чтобы получить новую ссылку.</p>
            </div>
        `;
    }
    
    function showErrorScreen() {
        document.body.innerHTML = `
            <div style="background: black; color: white; text-align: center; padding: 100px 20px; font-family: sans-serif; min-height: 100vh;">
                <h1 style="font-size: 32px;">⚠️ Ошибка</h1>
                <p style="margin: 20px 0; color: #aaa;">Не удалось проверить доступ. Попробуйте позже.</p>
            </div>
        `;
    }
    
    // Запускаем проверку перед загрузкой галереи
    checkToken().then(granted => {
        if (granted) {
            renderGallery(items);
        }
    });
